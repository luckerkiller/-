<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>计提调账系统 · 产品汇报</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
  background: #f0f2f5;
  color: #1a1a1a;
  height: 100vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* ── 顶部导航栏 ── */
.nav {
  background: #fff;
  border-bottom: 1px solid #e8e8e8;
  padding: 0 24px;
  display: flex;
  align-items: stretch;
  gap: 0;
  flex-shrink: 0;
  box-shadow: 0 1px 4px rgba(0,0,0,.06);
}

.nav-brand {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 14px 20px 14px 0;
  margin-right: 8px;
  border-right: 1px solid #f0f0f0;
}
.nav-brand .dot {
  width: 8px; height: 8px; border-radius: 50%;
  background: linear-gradient(135deg, #3a5bc0, #6d28d9);
}
.nav-brand .title {
  font-size: 14px; font-weight: 700; color: #111;
}
.nav-brand .sub {
  font-size: 11px; color: #aaa; margin-left: 2px;
}

.nav-tabs {
  display: flex;
  align-items: stretch;
  gap: 0;
  flex: 1;
}

.tab-btn {
  display: flex;
  align-items: center;
  gap: 7px;
  padding: 0 20px;
  font-size: 13px;
  color: #666;
  cursor: pointer;
  border: none;
  background: none;
  border-bottom: 2px solid transparent;
  transition: all .15s;
  white-space: nowrap;
  font-family: inherit;
}
.tab-btn:hover { color: #333; background: #fafafa; }
.tab-btn.active {
  color: #3a5bc0;
  border-bottom-color: #3a5bc0;
  font-weight: 600;
}
.tab-btn .tab-icon { font-size: 15px; }
.tab-btn .tab-tag {
  font-size: 9px; font-weight: 700; padding: 1px 6px;
  border-radius: 9px; background: #f0f4ff; color: #3a5bc0;
  border: 1px solid #c4d0f0;
}

.nav-info {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 0 0 0 16px;
  border-left: 1px solid #f0f0f0;
  margin-left: 8px;
}
.nav-date {
  font-size: 11px; color: #bbb;
}

/* ── 内容区 ── */
.content {
  flex: 1;
  overflow: hidden;
  position: relative;
}

.panel {
  position: absolute;
  inset: 0;
  display: none;
}
.panel.active { display: flex; flex-direction: column; }

/* iframe 面板 */
.panel iframe {
  flex: 1;
  border: none;
  width: 100%;
  background: #fff;
}

/* 图片面板 */
.img-panel {
  flex: 1;
  overflow: auto;
  display: flex;
  align-items: flex-start;
  justify-content: center;
  background: #f8f9fb;
  padding: 24px;
}
.img-panel img {
  max-width: 100%;
  border-radius: 8px;
  box-shadow: 0 4px 20px rgba(0,0,0,.12);
}

/* 演示面板提示条 */
.demo-bar {
  background: #fffbeb;
  border-bottom: 1px solid #fde68a;
  padding: 8px 20px;
  font-size: 11px;
  color: #92400e;
  display: flex;
  align-items: center;
  gap: 8px;
  flex-shrink: 0;
}
.demo-bar .demo-dot {
  width: 7px; height: 7px; border-radius: 50%;
  background: #f59e0b; flex-shrink: 0;
}
</style>
</head>
<body>

<!-- 顶部导航 -->
<div class="nav">
  <div class="nav-brand">
    <div class="dot"></div>
    <span class="title">计提调账系统</span>
    <span class="sub">· 产品汇报</span>
  </div>

  <div class="nav-tabs">
    <button class="tab-btn active" onclick="switchTab(0)">
      <span class="tab-icon">🗺️</span>
      全景架构 &amp; Roadmap
    </button>
    <button class="tab-btn" onclick="switchTab(1)">
      <span class="tab-icon">📐</span>
      计提系统产品架构
    </button>
    <button class="tab-btn" onclick="switchTab(2)">
      <span class="tab-icon">🖼️</span>
      产品架构总图
    </button>
    <button class="tab-btn" onclick="switchTab(3)">
      <span class="tab-icon">🖥️</span>
      系统演示
      <span class="tab-tag">DEMO</span>
    </button>
  </div>

  <div class="nav-info">
    <span class="nav-date" id="today"></span>
  </div>
</div>

<!-- 内容区 -->
<div class="content">

  <!-- Tab 0: 全景架构 + Roadmap -->
  <div class="panel active" id="panel-0">
    <iframe src="roadmap-arch.html" title="全景架构 Roadmap"></iframe>
  </div>

  <!-- Tab 1: 计提系统产品架构 -->
  <div class="panel" id="panel-1">
    <iframe src="architecture.html" title="计提调账系统产品架构图"></iframe>
  </div>

  <!-- Tab 2: 产品架构总图 PNG -->
  <div class="panel" id="panel-2">
    <div class="img-panel">
      <img src="%E4%BA%A7%E5%93%81%E6%9E%B6%E6%9E%84%E5%9B%BE_v2.png" alt="产品架构总图"
           onerror="this.parentElement.innerHTML='<div style=\'text-align:center;color:#aaa;padding:60px;\'><div style=\'font-size:48px;margin-bottom:16px;\'>🖼️</div><div style=\'font-size:14px;\'>图片未找到</div><div style=\'font-size:11px;margin-top:8px;\'>请将 <b>产品架构图_v2.png</b> 放到与此文件同目录，或上传至 GitHub 同仓库</div></div>'">
    </div>
  </div>

  <!-- Tab 3: 系统演示 (localhost) -->
  <div class="panel" id="panel-3">
    <div class="demo-bar">
      <div class="demo-dot"></div>
      系统演示已部署至 Vercel &nbsp;·&nbsp; 公网可访问：<b>https://jiti-system.vercel.app</b>
    </div>
    <iframe src="https://jiti-system.vercel.app" title="系统演示"></iframe>
  </div>

</div>

<script>
// 日期
const d = new Date();
document.getElementById('today').textContent =
  d.getFullYear() + '.' + String(d.getMonth()+1).padStart(2,'0') + '.' + String(d.getDate()).padStart(2,'0');

// 切换标签
function switchTab(idx) {
  document.querySelectorAll('.tab-btn').forEach((b, i) => {
    b.classList.toggle('active', i === idx);
  });
  document.querySelectorAll('.panel').forEach((p, i) => {
    p.classList.toggle('active', i === idx);
  });
}
</script>

</body>
</html>
